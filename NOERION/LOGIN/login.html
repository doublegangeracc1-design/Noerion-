<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOERION Login</title>
</head>

<body>
    <div class="background-wave">
        <svg viewBox="0 0 1400 400" preserveAspectRatio="none" fill="none">

            <defs>

                <!-- Cyan Glow -->
                <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="6" result="blur1" />
                    <feGaussianBlur stdDeviation="12" result="blur2" />
                    <feMerge>
                        <feMergeNode in="blur2" />
                        <feMergeNode in="blur1" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>

                <!-- Secondary Blue Glow -->
                <filter id="glow-blue-alt" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="5" result="blur1" />
                    <feGaussianBlur stdDeviation="10" result="blur2" />
                    <feMerge>
                        <feMergeNode in="blur2" />
                        <feMergeNode in="blur1" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>

                <!-- Scatter Background Glow -->
                <filter id="glow-scatter-blue" x="-40%" y="-40%" width="180%" height="180%">
                    <feGaussianBlur stdDeviation="22" result="scatterBlur" />
                    <feMerge>
                        <feMergeNode in="scatterBlur" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>

            </defs>

            <!-- Background Scatter Wave -->
            <g filter="url(#glow-scatter-blue)">
                <path id="waveShadow" />
            </g>

            <!-- Main Cyan Wave -->
            <g filter="url(#glow-cyan)">
                <path id="waveCyan" />
            </g>

            <!-- Secondary Blue Wave -->
            <g filter="url(#glow-blue-alt)">
                <path id="waveBlue" />
            </g>

        </svg>

        <div class="background-frost"></div>

    </div>

    <div class="login-card">
        <h1>NOERION</h1>
        <h3>Welcome Back to NOERION</h3>
        <p class="subtitle">Access your cognitive evaluation system.</p>

        <form id="loginForm">
            <div class="input-group">
                <img src="./assets/email.svg" alt="Email" class="icon">
                <input type="email" id="email" name="email" placeholder="Email" required autocomplete="email">
            </div>

            <div class="input-group">
                <img src="./assets/password.svg" alt="Password" class="icon">

                <input type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password">
                
                <i class="fa-regular fa-eye password-toggle" id="togglePassword"></i>
            </div>

            <div class="error-message" id="loginError"></div>

            <button type="submit" class="btn-primary">Login</button>
            <button type="button" class="btn-secondary">Request Access</button>
        </form>

        <div class="footer">
            <a href="#">Forgot Password?</a>
        </div>
    </div>
    <script src="login.js"></script>

</body>

</html>
