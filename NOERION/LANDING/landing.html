<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOERION - Measure Skills Beyond Scores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyberDark: '#030712',
                        neonCyan: '#00f2fe',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="./landing.css">
</head>
<body class="bg-cyberDark text-white font-sans antialiased overflow-x-hidden">

    <nav class="fixed top-0 w-full z-50 bg-cyberDark/70 backdrop-blur-md border-b border-white/5 px-6 md:px-12 py-4 flex justify-between items-center">
        <div class="text-xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-neonCyan to-white">
            NOERION
        </div>
        <div class="hidden md:flex space-x-14 text-sm font-medium text-gray-400">
            <a href="#features" class="hover:text-neonCyan transition-colors duration-300">Features</a>
            <a href="#how-it-works" class="hover:text-neonCyan transition-colors duration-300">How it Works</a>
            <a href="#" class="hover:text-neonCyan transition-colors duration-300">Institution</a>
        </div>
        <a href="../LOGIN/login.html" class="border border-neonCyan/50 text-neonCyan text-xs font-semibold px-5 py-2 rounded-full hover:bg-neonCyan hover:text-cyberDark shadow-[0_0_15px_rgba(0,242,254,0.2)] transition-all duration-300">
            Login / Request Access
        </a>
    </nav>

    <section id="hero" class="min-h-screen pt-28 pb-16 px-6 flex flex-col items-center justify-start text-center relative bg-cyberDark overflow-hidden">
        
        <div class="absolute inset-0 w-full h-full pointer-events-none z-0">
            <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-neonCyan/5 rounded-full blur-[120px]"></div>
            <div class="absolute top-[400px] left-[-100px] w-[600px] h-[600px] bg-neonCyan/5 rounded-full blur-[150px]"></div>
            <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(16,24,48,0.4)_0%,transparent_70%)]"></div>
            <div class="absolute -left-20 top-1/4 w-96 h-96 bg-neonCyan/5 rounded-full filter blur-[100px]"></div>

            <div class="absolute top-[75%] left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-[400px] mix-blend-screen opacity-90">
                <svg class="w-full h-full" viewBox="0 0 1400 400" preserveAspectRatio="none" fill="none">
                    <defs>
                        <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="6" result="blur1" /><feGaussianBlur stdDeviation="12" result="blur2" /><feMerge><feMergeNode in="blur2" /><feMergeNode in="blur1" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
                        <filter id="glow-blue-alt" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="5" result="blur1" /><feGaussianBlur stdDeviation="10" result="blur2" /><feMerge><feMergeNode in="blur2" /><feMergeNode in="blur1" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
                        <filter id="glow-scatter-blue" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="22" result="scatterBlur" /><feMerge><feMergeNode in="scatterBlur" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
                    </defs>
                    <g filter="url(#glow-scatter-blue)"><path id="bg-wave-blue-shadow" class="stroke-cyan-300/40" stroke-width="8" stroke-linecap="round" d="" /></g>
                    <g filter="url(#glow-cyan)"><path id="bg-wave-cyan" class="stroke-neonCyan" stroke-width="4" stroke-linecap="round" d="" /></g>
                    <g filter="url(#glow-blue-alt)"><path id="bg-wave-blue-secondary" class="stroke-cyan-400/80" stroke-width="3" stroke-linecap="round" d="" /></g>
                </svg>
            </div>
        </div>

        <div class="w-full flex flex-col items-center flex-1 relative z-20">
            <div class="max-w-5xl mx-auto flex flex-col items-center mt-4 mb-6">
                <h1 class="text-4xl sm:text-5xl md:text-6xl font-extrabold tracking-tight mb-4 leading-tight max-w-4xl">
                    Measure Skills <br class="hidden sm:inline"/>
                    <span class="text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-300">Beyond Scores</span>
                </h1>
                <p class="text-gray-400 text-sm sm:text-base tracking-wide max-w-2xl mb-8 font-light">
                    EEG + AI + Secure Digital Certification for Smarter Evaluation
                </p>
                <div class="flex flex-wrap justify-center gap-4">
                    <button class="bg-gradient-to-r from-neonCyan via-blue-500 to-indigo-600 text-white font-bold px-8 py-3 rounded-full hover:opacity-90 shadow-[0_0_25px_rgba(0,242,254,0.45)] transition-all">Get Started</button>
                    <button class="bg-transparent border border-gray-700 text-gray-300 font-semibold px-8 py-3 rounded-full hover:border-neonCyan/50 hover:text-neonCyan transition-all">Verify Certificate</button>
                </div>
            </div>

            <div class="w-full min-h-[340px] relative mt-auto flex items-center justify-center">
                <div class="w-full max-w-2xl h-[280px] border border-white/10 rounded-2xl bg-gradient-to-b from-white/[0.02] to-transparent pointer-events-none overflow-hidden shadow-[2px_4px_24px_rgba(0,0,0,0.6)]">
                    <div class="absolute inset-0 opacity-[0.04]" style="background-image: linear-gradient(to right, white 1px, transparent 1px), linear-gradient(to bottom, white 1px, transparent 1px); background-size: 30px 30px;"></div>
                </div>
            </div>
        </div>
    </section>

   <section id="features" class="py-24 px-6 max-w-6xl mx-auto relative z-10">
        <h2 class="text-center text-3xl font-bold mb-16 tracking-wide">Features</h2>
        <div id="features-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </section>

    <section id="how-it-works" class="py-24 px-6 max-w-5xl mx-auto relative z-10">
        <h2 class="text-center text-3xl font-bold mb-20 tracking-wide">How it Works</h2>
        <div id="timeline-container" class="relative"></div>
    </section>

    <footer class="border-t border-white/5 py-12 px-6 max-w-6xl mx-auto text-xs text-gray-600 flex flex-col sm:flex-row justify-between items-center gap-4 relative z-10">
        <div>&copy; 2026 NOERION. All rights reserved.</div>
        <div class="flex gap-8">
            <a href="#" class="hover:text-gray-400 transition-colors">About NOERION</a>
            <a href="#" class="hover:text-gray-400 transition-colors">Contact</a>
            <a href="#" class="hover:text-gray-400 transition-colors">Support</a>
        </div>
    </footer>

    <script src="./landing.js"></script>
</body>
</html>
